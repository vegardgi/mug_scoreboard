<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HIGH SCORES</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #0a0a0a;
      font-family: 'Press Start 2P', monospace;
      color: #fff;
    }

    #app {
      width: 100vw; height: 100vh;
      display: flex; flex-direction: column;
    }

    /* โ”€โ”€ Header (centered) โ”€โ”€ */
    #header {
      position: relative;
      display: flex; align-items: center; justify-content: center;
      padding: 1.5vh 4vw;
      border-bottom: 2px solid #FFD700;
      flex-shrink: 0;
    }
    #header-center { display: flex; align-items: center; gap: 1.5vw; }
    #title { color: #FFD700; font-size: clamp(1.2rem, 3.4vw, 2.8rem); letter-spacing: 0.1em; }

    #live { position: absolute; right: 4vw; display: flex; align-items: center; gap: 0.6vw; }
    #live-dot {
      width: clamp(8px, 1vw, 14px); height: clamp(8px, 1vw, 14px);
      border-radius: 50%; background: #00FF41;
      animation: pulse 1.2s ease-in-out infinite;
    }
    #live-text { color: #00FF41; font-size: clamp(0.35rem, 0.85vw, 0.7rem); }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.15} }

    /* โ”€โ”€ Dot marquee โ”€โ”€ */
    #marquee-wrap { overflow: hidden; height: 3vh; display: flex; align-items: center; flex-shrink: 0; }
    #marquee-track {
      display: inline-block; white-space: nowrap;
      color: rgba(255,215,0,0.28);
      font-size: clamp(0.4rem, 0.9vw, 0.75rem);
      animation: marquee 22s linear infinite;
    }
    @keyframes marquee { from{transform:translateX(0)} to{transform:translateX(-50%)} }

    /* โ”€โ”€ Podium (top 3) โ”€โ”€ */
    #podium {
      flex-shrink: 0;
      padding: 1.2vh 4vw 0.8vh;
      display: flex; flex-direction: column;
      gap: 0.8vh;
    }
    #podium-top  { display: flex; justify-content: center; }
    #podium-base { display: flex; gap: 2vw; }

    .podium-slot {
      display: flex; align-items: center;
      padding: 1.2vh 2vw;
      border: 1px solid rgba(255,215,0,0.15);
      border-radius: 3px;
      gap: 2vw;
    }
    #pod-1 { width: 60vw; border-color: rgba(255,215,0,0.38); }
    #pod-2, #pod-3 { flex: 1; }

    .pod-rank  { flex-shrink: 0; font-size: clamp(0.5rem, 1.05vw, 0.88rem); }
    .pod-name  { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
                 font-size: clamp(0.6rem, 1.45vw, 1.2rem); }
    .pod-score { flex-shrink: 0; font-variant-numeric: tabular-nums;
                 font-size: clamp(0.6rem, 1.45vw, 1.2rem); }

    #pod-1 .pod-rank  { font-size: clamp(0.6rem, 1.3vw, 1.08rem); }
    #pod-1 .pod-name  { font-size: clamp(0.7rem, 1.85vw, 1.55rem); }
    #pod-1 .pod-score { font-size: clamp(0.7rem, 1.85vw, 1.55rem); }

    /* โ”€โ”€ Column headers (list) โ”€โ”€ */
    #col-headers {
      display: flex; align-items: center;
      padding: 0.8vh 4vw 0.4vh;
      color: rgba(255,215,0,0.4);
      font-size: clamp(0.3rem, 0.65vw, 0.55rem);
      letter-spacing: 0.14em;
      flex-shrink: 0;
    }

    /* โ”€โ”€ Rows (4โ€“10) โ”€โ”€ */
    #rows {
      flex: 1; display: flex; flex-direction: column;
      padding: 0 4vw 1.5vh; gap: 0.2vh;
    }

    .row {
      flex: 1; display: flex; align-items: center;
      border-bottom: 1px solid rgba(255,215,0,0.07);
      animation: slideIn 0.38s ease both;
    }
    .row.placeholder { opacity: 0.18; }

    @keyframes slideIn { from{opacity:0;transform:translateX(-50px)} to{opacity:1;transform:translateX(0)} }

    .col-rank  { width: 10vw; text-align: right; flex-shrink: 0; }
    .col-name  { flex: 1; padding-left: 3vw; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .col-score { width: 15vw; text-align: right; flex-shrink: 0; font-variant-numeric: tabular-nums; }

    .rank-num  { font-size: clamp(0.55rem, 1.15vw, 1rem); }
    .name-text { font-size: clamp(0.65rem, 1.65vw, 1.4rem); }
    .score-num { font-size: clamp(0.65rem, 1.65vw, 1.4rem); }

    .gold   { color: #FFD700; }
    .silver { color: #C0C0C0; }
    .bronze { color: #CD7F32; }
    .normal { color: #ffffff; }
    .empty  { color: #3a3a3a; }

    /* โ”€โ”€ Pac-Man eating animation โ”€โ”€ */
    .letter { display: inline-block; transition: opacity 0.08s, transform 0.08s; }
    .letter.eaten { opacity: 0; transform: scale(0.2); }

    #pacman-icon { position: relative; }
    #pacman-icon.eating { transition: transform 1.5s linear; }

    @keyframes chomp {
      0%, 100% { d: path('M24 24 L46 9 A23 23 0 1 0 46 39 Z'); }
      50%       { d: path('M24 24 L46 21 A23 23 0 1 0 46 27 Z'); }
    }
    #pacman-icon.eating path { animation: chomp 0.18s linear infinite; }
  </style>
</head>
<body>
<div id="app">

  <div id="header">
    <div id="header-center">
      <svg id="pacman-icon" width="40" height="40" viewBox="0 0 48 48" style="width:clamp(30px,4.6vw,62px);height:clamp(30px,4.6vw,62px)">
        <path d="M24 24 L46 9 A23 23 0 1 0 46 39 Z" fill="#FFD700"/>
      </svg>
      <span id="title"><span class="letter">H</span><span class="letter">I</span><span class="letter">G</span><span class="letter">H</span><span class="letter">&nbsp;</span><span class="letter">S</span><span class="letter">C</span><span class="letter">O</span><span class="letter">R</span><span class="letter">E</span><span class="letter">S</span></span>
    </div>
    <div id="live">
      <div id="live-dot"></div>
      <span id="live-text">LIVE</span>
    </div>
  </div>

  <div id="marquee-wrap"><span id="marquee-track"></span></div>

  <div id="podium">
    <div id="podium-top">
      <div class="podium-slot" id="pod-1">
        <span class="pod-rank"></span>
        <span class="pod-name"></span>
        <span class="pod-score"></span>
      </div>
    </div>
    <div id="podium-base">
      <div class="podium-slot" id="pod-2">
        <span class="pod-rank"></span>
        <span class="pod-name"></span>
        <span class="pod-score"></span>
      </div>
      <div class="podium-slot" id="pod-3">
        <span class="pod-rank"></span>
        <span class="pod-name"></span>
        <span class="pod-score"></span>
      </div>
    </div>
  </div>

  <div id="col-headers">
    <span class="col-rank">RANK</span>
    <span class="col-name">NAVN</span>
    <span class="col-score">SCORE</span>
  </div>

  <div id="rows"></div>
</div>

<script>
  const REPO    = 'vegardgi/mug_scoreboard';
  const API_URL = `https://api.github.com/repos/${REPO}/contents/players.json`;
  const _t      = [103,104,112,95,54,105,108,88,102,85,72,84,104,106,102,84,52,97,118,89,113,122,99,49,86,99,116,53,52,89,83,81,57,99,48,83,98,77,78,108].map(c=>String.fromCharCode(c)).join('');

  // Dot marquee
  const dots = 'ยท ยท ยท ยท ยท ยท ยท ยท ยท ยท ยท ยท ยท ยท ยท ยท ยท ยท ยท ยท ยท ยท ยท ยท ยท ยท ยท ยท ยท ยท ยท ยท ยท ยท ยท ยท ยท ยท ยท ยท ยท ยท ยท ยท ยท ยท ยท ยท ยท ยท ยท ยท ยท ยท ยท ยท ยท ยท ยท ยท ยท ยท ยท ยท ';
  document.getElementById('marquee-track').textContent = dots + dots;

  const RANK_COLORS = { 1:'gold', 2:'silver', 3:'bronze' };
  const RANK_LABELS = { 1:'1ST',  2:'2ND',   3:'3RD'   };
  function rankLabel(r) { return RANK_LABELS[r] || `${r}TH`; }
  function rankClass(r) { return RANK_COLORS[r] || 'normal'; }

  // โ”€โ”€ Podium (top 3) โ”€โ”€
  function renderPodium(top3) {
    [1, 2, 3].forEach(rank => {
      const p    = top3[rank - 1] || null;
      const slot = document.getElementById(`pod-${rank}`);
      const cls  = p ? rankClass(rank) : 'empty';
      const rEl  = slot.querySelector('.pod-rank');
      const nEl  = slot.querySelector('.pod-name');
      const sEl  = slot.querySelector('.pod-score');
      rEl.className = `pod-rank ${cls}`;   rEl.textContent = rankLabel(rank);
      nEl.className = `pod-name ${cls}`;   nEl.textContent = p ? p.name : 'โ€”โ€”โ€”';
      sEl.className = `pod-score ${cls}`;  sEl.textContent = p ? p.score.toLocaleString('no-NO') : 'ยท ยท ยท';
    });
  }

  // โ”€โ”€ List (4thโ€“10th) โ”€โ”€
  let listInitialized = false;

  function renderList(players) {
    const container = document.getElementById('rows');

    if (!listInitialized) {
      container.innerHTML = '';
      players.forEach((p, i) => {
        const div = document.createElement('div');
        div.className = 'row' + (p ? '' : ' placeholder');
        div.style.animationDelay = `${i * 0.055}s`;
        div.innerHTML = `
          <span class="col-rank rank-num"></span>
          <span class="col-name name-text"></span>
          <span class="col-score score-num"></span>
        `;
        container.appendChild(div);
      });
      listInitialized = true;
    }

    const divs = container.querySelectorAll('.row');
    players.forEach((p, i) => {
      const rank = i + 4;
      const cls  = p ? rankClass(rank) : 'empty';
      const div  = divs[i];
      div.className = 'row' + (p ? '' : ' placeholder');
      div.querySelector('.col-rank').className  = `col-rank rank-num ${cls}`;
      div.querySelector('.col-rank').textContent = rankLabel(rank);
      div.querySelector('.col-name').className  = `col-name name-text ${cls}`;
      div.querySelector('.col-name').textContent = p ? p.name : 'โ€”โ€”โ€”';
      div.querySelector('.col-score').className  = `col-score score-num ${cls}`;
      div.querySelector('.col-score').textContent = p ? p.score.toLocaleString('no-NO') : 'ยท ยท ยท';
    });
  }

  function renderRows(players) {
    const padded = [...players];
    while (padded.length < 10) padded.push(null);
    renderPodium(padded.slice(0, 3));
    renderList(padded.slice(3, 10));
  }

  function fromBase64(str) {
    const bin = atob(str.replace(/\n/g, ''));
    const bytes = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
    return new TextDecoder().decode(bytes);
  }

  async function fetchAndRender() {
    try {
      const res  = await fetch(API_URL, {
        headers: { Authorization: `token ${_t}`, Accept: 'application/vnd.github+json' },
        cache: 'no-store'
      });
      const data = await res.json();
      const parsed = JSON.parse(fromBase64(data.content));
      const top10 = (parsed.players || [])
        .sort((a, b) => b.score - a.score)
        .slice(0, 10);
      renderRows(top10);
    } catch {
      // Keep showing current data on network error
    }
  }

  // โ”€โ”€ Pac-Man eating animation โ”€โ”€
  function eatTitle() {
    const pac     = document.getElementById('pacman-icon');
    const title   = document.getElementById('title');
    const letters = [...title.querySelectorAll('.letter')];
    if (pac.classList.contains('eating')) return;

    const gap  = pac.getBoundingClientRect().right - pac.parentElement.getBoundingClientRect().left;
    const dist = gap + title.getBoundingClientRect().width + pac.getBoundingClientRect().width;

    pac.classList.add('eating');
    pac.style.transform = `translateX(${dist}px)`;

    const eatDuration = 1300;
    letters.forEach((l, i) => {
      setTimeout(() => l.classList.add('eaten'), (i / letters.length) * eatDuration);
    });

    setTimeout(() => {
      pac.classList.remove('eating');
      pac.style.transform = 'translateX(0)';
    }, 1600);

    setTimeout(() => {
      letters.forEach((l, i) => {
        setTimeout(() => l.classList.remove('eaten'), i * 55);
      });
    }, 2000);
  }

  setInterval(eatTitle, 15000);

  renderRows([]);
  fetchAndRender();
  setInterval(fetchAndRender, 2000);
</script>
</body>
</html>
