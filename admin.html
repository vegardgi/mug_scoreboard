<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Scoreboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0a; color: #fff;
      font-family: monospace; font-size: 14px;
      min-height: 100vh;
    }

    a { color: #FFD700; }

    /* ── Login screen ── */
    #login-screen {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 2rem;
    }
    #login-box {
      background: #111; border: 1px solid #333; border-radius: 8px;
      padding: 2.5rem; max-width: 380px; width: 100%;
    }
    #login-box h1 { color: #FFD700; font-size: 1.1rem; margin-bottom: 0.5rem; }
    #login-box p  { color: #555; font-size: 0.8rem; margin-bottom: 1.5rem; }

    /* ── Main admin ── */
    #admin-screen { display: none; padding: 2rem; max-width: 1200px; margin: 0 auto; }

    #top-bar {
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 2px solid #FFD700; padding-bottom: 1rem; margin-bottom: 1.5rem;
    }
    #top-bar h1 { color: #FFD700; font-size: 1.2rem; }
    #player-count { color: #555; font-size: 0.8rem; margin-top: 0.3rem; }
    #top-actions { display: flex; gap: 0.75rem; align-items: center; }

    /* ── Buttons ── */
    .btn {
      padding: 0.5rem 1.1rem; border-radius: 5px; border: none;
      font-family: monospace; font-size: 0.85rem; cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.8; }
    .btn-primary { background: #FFD700; color: #000; font-weight: bold; }
    .btn-ghost   { background: #1a1a1a; color: #aaa; border: 1px solid #333; }
    .btn-edit    { background: #1a3a1a; color: #4caf50; border: 1px solid #2d5a2d; font-size: 0.8rem; padding: 0.3rem 0.7rem; }
    .btn-delete  { background: #3a1a1a; color: #f44336; border: 1px solid #5a2d2d; font-size: 0.8rem; padding: 0.3rem 0.7rem; }
    .btn-confirm { background: #f44336; color: #fff; font-size: 0.8rem; padding: 0.3rem 0.7rem; }
    .btn-cancel  { background: #333;    color: #aaa; font-size: 0.8rem; padding: 0.3rem 0.7rem; }
    .btn-logout  { background: transparent; color: #555; border: 1px solid #333; font-size: 0.75rem; padding: 0.35rem 0.8rem; }

    /* ── Status bar ── */
    #status-bar {
      font-size: 0.78rem; padding: 0.5rem 0.8rem; border-radius: 4px;
      margin-bottom: 1rem; display: none;
    }
    #status-bar.success { background: #1a3a1a; color: #4caf50; display: block; }
    #status-bar.error   { background: #3a1a1a; color: #f44336; display: block; }

    /* ── Table ── */
    .table-wrap { overflow-x: auto; border-radius: 6px; border: 1px solid #222; }
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    thead tr { background: #111; border-bottom: 1px solid #333; }
    thead th { padding: 0.75rem 1rem; text-align: left; color: #FFD700; font-size: 0.75rem; white-space: nowrap; }
    tbody tr { border-bottom: 1px solid #1a1a1a; }
    tbody tr:nth-child(even) { background: #0d0d0d; }
    tbody tr:nth-child(odd)  { background: #111; }
    tbody tr:hover { background: #151515; }
    td { padding: 0.65rem 1rem; vertical-align: middle; }
    .td-rank  { color: #555; width: 3rem; }
    .td-name  { color: #fff; font-weight: bold; }
    .td-score { color: #FFD700; }
    .td-meta  { color: #888; }
    .td-empty { color: #333; }
    .td-actions { white-space: nowrap; }
    .confirm-inline { display: flex; align-items: center; gap: 0.4rem; }
    .confirm-label  { color: #f44336; font-size: 0.75rem; }
    .no-players { text-align: center; padding: 3rem; color: #444; }

    /* ── Danger zone ── */
    #danger-zone {
      margin-top: 3rem; padding: 1.5rem;
      border: 1px solid #3a1a1a; border-radius: 6px;
      display: flex; align-items: center; justify-content: space-between; gap: 1rem;
    }
    #danger-zone p { color: #666; font-size: 0.78rem; }
    #delete-all-confirm {
      display: none; align-items: center; gap: 0.5rem;
    }
    #delete-all-confirm.visible { display: flex; }

    /* ── Modal ── */
    #modal-overlay {
      display: none; position: fixed; inset: 0; z-index: 100;
      background: rgba(0,0,0,0.8); backdrop-filter: blur(4px);
      align-items: center; justify-content: center;
    }
    #modal-overlay.open { display: flex; }
    #modal-box {
      background: #111; border: 1px solid #333; border-radius: 8px;
      padding: 2rem; width: 100%; max-width: 440px; max-height: 90vh; overflow-y: auto;
    }
    #modal-title { color: #FFD700; font-size: 1rem; margin-bottom: 1.5rem; }

    .field { display: flex; flex-direction: column; gap: 0.35rem; margin-bottom: 1rem; }
    .field label { font-size: 0.75rem; color: #888; }
    .field input {
      background: #1a1a1a; border: 1px solid #333; border-radius: 4px;
      color: #fff; font-family: monospace; font-size: 0.9rem;
      padding: 0.55rem 0.75rem; outline: none; width: 100%;
      transition: border-color 0.15s;
    }
    .field input:focus { border-color: #FFD700; }
    .field-divider {
      border-top: 1px solid #222; margin: 0.5rem 0 1rem;
      padding-top: 0.75rem; font-size: 0.72rem; color: #555;
    }
    #modal-error { color: #f44336; font-size: 0.8rem; margin-bottom: 0.75rem; display: none; }
    #modal-actions { display: flex; gap: 0.75rem; margin-top: 1.2rem; }
    #modal-actions .btn-primary { flex: 1; }
  </style>
</head>
<body>

<!-- ── Login screen ── -->
<div id="login-screen">
  <div id="login-box">
    <h1>Admin — Scoreboard</h1>
    <p>Skriv inn passordet for å fortsette.</p>
    <div class="field">
      <label>Passord</label>
      <input type="password" id="password-input" autocomplete="off" autofocus>
    </div>
    <div id="login-error" style="color:#f44336;font-size:0.8rem;margin-bottom:0.75rem;display:none">
      Feil passord.
    </div>
    <button class="btn btn-primary" onclick="checkPassword()" style="width:100%">Logg inn</button>
  </div>
</div>

<!-- ── Admin screen ── -->
<div id="admin-screen">
  <div id="top-bar">
    <div>
      <h1>Admin — Scoreboard</h1>
      <div id="player-count"></div>
    </div>
    <div id="top-actions">
      <a href="index.html" target="_blank" class="btn btn-ghost">Vis scoreboard ↗</a>
      <button class="btn btn-ghost" onclick="exportCSV()">Eksporter CSV</button>
      <button class="btn btn-primary" onclick="openAddModal()">+ Legg til spiller</button>
      <button class="btn btn-logout" onclick="logout()">Logg ut</button>
    </div>
  </div>

  <div id="status-bar"></div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>#</th><th>Navn</th><th>Score</th>
          <th>Alder</th><th>E-post</th><th>Telefon</th><th>Lagt til</th><th>Handlinger</th>
        </tr>
      </thead>
      <tbody id="player-tbody">
        <tr><td colspan="8" class="no-players">Laster...</td></tr>
      </tbody>
    </table>
    <div id="danger-zone">
      <p>Slett alle spillere permanent. Kan ikke angres.</p>
      <div>
        <button class="btn btn-delete" onclick="startDeleteAll()">Slett alle brukere</button>
        <div id="delete-all-confirm">
          <span class="confirm-label">Er du helt sikker?</span>
          <button class="btn btn-confirm" onclick="confirmDeleteAll()">Ja, slett alle</button>
          <button class="btn btn-cancel"  onclick="cancelDeleteAll()">Avbryt</button>
        </div>
      </div>
    </div>
</div>

<!-- ── Modal ── -->
<div id="modal-overlay" onclick="handleOverlayClick(event)">
  <div id="modal-box">
    <div id="modal-title">Legg til spiller</div>
    <form onsubmit="handleModalSubmit(event)">
      <div class="field"><label>Navn *</label><input type="text"   id="f-name"  required autocomplete="off"></div>
      <div class="field"><label>Score</label> <input type="number" id="f-score" value="0" min="0"></div>
      <div class="field-divider">Kun synlig i admin</div>
      <div class="field"><label>Alder</label>  <input type="number" id="f-age"   min="0"></div>
      <div class="field"><label>E-post</label>  <input type="email"  id="f-email"></div>
      <div class="field"><label>Telefon</label> <input type="tel"    id="f-phone"></div>
      <div id="modal-error"></div>
      <div id="modal-actions">
        <button type="submit" class="btn btn-primary" id="modal-submit-btn">Legg til</button>
        <button type="button" class="btn btn-ghost"   onclick="closeModal()">Avbryt</button>
      </div>
    </form>
  </div>
</div>

<script>
  // ── ENDRE PASSORD HER ──────────────────────────────────────────────
  const ADMIN_PASSWORD = 'mugscore';
  // ──────────────────────────────────────────────────────────────────

  const REPO    = 'vegardgi/mug_scoreboard';
  const API_URL = `https://api.github.com/repos/${REPO}/contents/players.json`;
  const _t      = [103,104,112,95,54,105,108,88,102,85,72,84,104,106,102,84,52,97,118,89,113,122,99,49,86,99,116,53,52,89,83,81,57,99,48,83,98,77,78,108].map(c=>String.fromCharCode(c)).join('');

  let fileSha   = '';
  let players   = [];
  let editingId = null;
  let deletingId = null;

  // ── Auth ──
  function checkPassword() {
    const val = document.getElementById('password-input').value;
    if (val === ADMIN_PASSWORD) {
      sessionStorage.setItem('admin_ok', '1');
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('admin-screen').style.display = 'block';
      loadPlayers();
    } else {
      document.getElementById('login-error').style.display = 'block';
      document.getElementById('password-input').value = '';
      document.getElementById('password-input').focus();
    }
  }

  function logout() {
    sessionStorage.removeItem('admin_ok');
    document.getElementById('admin-screen').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('password-input').value = '';
    document.getElementById('password-input').focus();
  }

  document.getElementById('password-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') checkPassword();
  });

  // ── Base64 helpers ──
  function toBase64(str) {
    const bytes = new TextEncoder().encode(str);
    let bin = '';
    bytes.forEach(b => bin += String.fromCharCode(b));
    return btoa(bin);
  }
  function fromBase64(str) {
    const bin = atob(str.replace(/\n/g, ''));
    const bytes = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
    return new TextDecoder().decode(bytes);
  }
  function escHtml(s) {
    return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
  function fmtTimestamp(iso) {
    if (!iso) return '—';
    const d = new Date(iso);
    return d.toLocaleString('no-NO', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' });
  }

  // ── GitHub API ──
  async function loadPlayers() {
    try {
      const res = await fetch(API_URL + `?t=${Date.now()}`, {
        headers: { Authorization: `token ${_t}`, Accept: 'application/vnd.github+json' },
        cache: 'no-store'
      });
      if (!res.ok) throw new Error(res.status);
      const data = await res.json();
      fileSha = data.sha;
      players = JSON.parse(fromBase64(data.content)).players || [];
      renderTable();
    } catch {
      showStatus('Kunne ikke laste spillere.', 'error');
    }
  }

  async function savePlayers(message) {
    const content = toBase64(JSON.stringify({ players }, null, 2) + '\n');
    const res = await fetch(API_URL, {
      method: 'PUT',
      headers: {
        Authorization: `token ${_t}`,
        Accept: 'application/vnd.github+json',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ message, content, sha: fileSha })
    });
    if (!res.ok) throw new Error(res.status);
    fileSha = (await res.json()).content.sha;
  }

  // ── Table ──
  function renderTable() {
    const tbody = document.getElementById('player-tbody');
    document.getElementById('player-count').textContent =
      `${players.length} spiller${players.length !== 1 ? 'e' : ''} totalt`;

    if (players.length === 0) {
      tbody.innerHTML = '<tr><td colspan="8" class="no-players">Ingen spillere ennå — legg til den første!</td></tr>';
      return;
    }

    const sorted = [...players].sort((a, b) => b.score - a.score);
    tbody.innerHTML = sorted.map((p, i) => {
      if (deletingId === p.id) {
        return `<tr>
          <td class="td-rank">${i+1}</td>
          <td class="td-name">${escHtml(p.name)}</td>
          <td class="td-score">${p.score.toLocaleString('no-NO')}</td>
          <td colspan="4" class="td-meta">—</td>
          <td class="td-actions">
            <span class="confirm-inline">
              <span class="confirm-label">Sikker?</span>
              <button class="btn btn-confirm" onclick="confirmDelete(${p.id})">Slett</button>
              <button class="btn btn-cancel"  onclick="cancelDelete()">Nei</button>
            </span>
          </td>
        </tr>`;
      }
      return `<tr>
        <td class="td-rank">${i+1}</td>
        <td class="td-name">${escHtml(p.name)}</td>
        <td class="td-score">${p.score.toLocaleString('no-NO')}</td>
        <td class="${p.age   != null ? 'td-meta':'td-empty'}">${p.age   != null ? p.age          : '—'}</td>
        <td class="${p.email ? 'td-meta':'td-empty'}">${p.email ? escHtml(p.email) : '—'}</td>
        <td class="${p.phone ? 'td-meta':'td-empty'}">${p.phone ? escHtml(p.phone) : '—'}</td>
        <td class="td-meta">${fmtTimestamp(p.createdAt)}</td>
        <td class="td-actions">
          <button class="btn btn-edit"   onclick="openEditModal(${p.id})">Rediger</button>
          <button class="btn btn-delete" onclick="startDelete(${p.id})">Slett</button>
        </td>
      </tr>`;
    }).join('');
  }

  // ── Status ──
  function showStatus(msg, type = 'info') {
    const el = document.getElementById('status-bar');
    el.textContent = msg; el.className = type;
    clearTimeout(el._t);
    el._t = setTimeout(() => { el.className = ''; el.style.display = 'none'; }, 3500);
  }

  // ── Modal ──
  function openAddModal() {
    editingId = null;
    document.getElementById('modal-title').textContent = 'Legg til spiller';
    document.getElementById('modal-submit-btn').textContent = 'Legg til';
    ['f-name','f-age','f-email','f-phone'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('f-score').value = '0';
    document.getElementById('modal-error').style.display = 'none';
    document.getElementById('modal-overlay').classList.add('open');
    document.getElementById('f-name').focus();
  }

  function openEditModal(id) {
    const p = players.find(x => x.id === id);
    if (!p) return;
    editingId = id;
    document.getElementById('modal-title').textContent = 'Rediger spiller';
    document.getElementById('modal-submit-btn').textContent = 'Lagre';
    document.getElementById('f-name').value  = p.name;
    document.getElementById('f-score').value = p.score;
    document.getElementById('f-age').value   = p.age   ?? '';
    document.getElementById('f-email').value = p.email ?? '';
    document.getElementById('f-phone').value = p.phone ?? '';
    document.getElementById('modal-error').style.display = 'none';
    document.getElementById('modal-overlay').classList.add('open');
    document.getElementById('f-name').focus();
  }

  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('open');
    editingId = null;
  }
  function handleOverlayClick(e) {
    if (e.target === document.getElementById('modal-overlay')) closeModal();
  }
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  async function handleModalSubmit(e) {
    e.preventDefault();
    const btn   = document.getElementById('modal-submit-btn');
    const errEl = document.getElementById('modal-error');
    const name  = document.getElementById('f-name').value.trim();
    const score = parseInt(document.getElementById('f-score').value, 10) || 0;
    const age   = document.getElementById('f-age').value   ? parseInt(document.getElementById('f-age').value, 10) : null;
    const email = document.getElementById('f-email').value.trim() || null;
    const phone = document.getElementById('f-phone').value.trim() || null;

    if (!name) { errEl.textContent = 'Navn er påkrevd.'; errEl.style.display = 'block'; return; }

    btn.textContent = 'Lagrer...'; btn.disabled = true; errEl.style.display = 'none';
    try {
      if (editingId !== null) {
        const idx = players.findIndex(p => p.id === editingId);
        if (idx !== -1) players[idx] = { ...players[idx], name, score, age, email, phone };
        await savePlayers(`Oppdater spiller: ${name}`);
        showStatus(`${name} er oppdatert.`, 'success');
      } else {
        players.push({ id: Date.now(), name, score, age, email, phone, createdAt: new Date().toISOString() });
        await savePlayers(`Legg til spiller: ${name}`);
        showStatus(`${name} er lagt til.`, 'success');
      }
      closeModal(); renderTable();
    } catch {
      errEl.textContent = 'Lagring feilet — prøv igjen.'; errEl.style.display = 'block';
    } finally {
      btn.textContent = editingId !== null ? 'Lagre' : 'Legg til';
      btn.disabled = false;
    }
  }

  // ── Delete ──
  function startDelete(id)  { deletingId = id;   renderTable(); }
  function cancelDelete()   { deletingId = null; renderTable(); }
  async function confirmDelete(id) {
    const name = players.find(x => x.id === id)?.name ?? 'Spiller';
    players = players.filter(x => x.id !== id);
    deletingId = null;
    try {
      await savePlayers(`Slett spiller: ${name}`);
      renderTable(); showStatus(`${name} er slettet.`, 'success');
    } catch {
      showStatus('Sletting feilet.', 'error'); loadPlayers();
    }
  }

  // ── Delete all ──
  function startDeleteAll() {
    document.getElementById('delete-all-confirm').classList.add('visible');
  }
  function cancelDeleteAll() {
    document.getElementById('delete-all-confirm').classList.remove('visible');
  }
  async function confirmDeleteAll() {
    cancelDeleteAll();
    const count = players.length;
    players = [];
    try {
      await savePlayers('Slett alle spillere');
      renderTable();
      showStatus(`${count} spiller${count !== 1 ? 'e' : ''} slettet.`, 'success');
    } catch {
      showStatus('Sletting feilet.', 'error'); loadPlayers();
    }
  }

  // ── CSV export ──
  function exportCSV() {
    const headers = ['ID', 'Navn', 'Score', 'Alder', 'E-post', 'Telefon', 'Lagt til'];
    const rows = [...players].sort((a, b) => b.score - a.score).map(p => [
      p.id,
      p.name,
      p.score,
      p.age  ?? '',
      p.email ?? '',
      p.phone ?? '',
      p.createdAt ? new Date(p.createdAt).toLocaleString('no-NO') : ''
    ]);
    const csv = '\uFEFF' + [headers, ...rows]
      .map(row => row.map(v => `"${String(v).replace(/"/g, '""')}"`).join(';'))
      .join('\r\n');
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8' }));
    a.download = `scoreboard_${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
    URL.revokeObjectURL(a.href);
  }

  // ── Init ──
  if (sessionStorage.getItem('admin_ok') === '1') {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-screen').style.display = 'block';
    loadPlayers();
  }
</script>
</body>
</html>
